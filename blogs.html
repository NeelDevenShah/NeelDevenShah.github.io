<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neel Shah - Medium Blogs</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --card-bg: #fff;
        --text-color: #222;
        --highlight-color: #005a80;
        --accent-color: #005a80;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      .nav {
        display: flex;
        justify-content: flex-end;
        padding: 20px;
        position: sticky;
        top: 0;
        background-color: rgba(26, 26, 26, 0.8);
        backdrop-filter: blur(5px);
        z-index: 1000;
      }
      .burger {
        display: none;
        cursor: pointer;
      }
      .burger div {
        width: 25px;
        height: 3px;
        background-color: var(--text-color);
        margin: 5px;
        transition: 0.3s;
      }
      .nav-links {
        display: flex;
      }
      .nav-links a {
        color: var(--text-color);
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      .nav-links a:hover {
        color: var(--accent-color);
      }
      @media only screen and (max-width: 600px) {
        .nav {
          justify-content: space-between;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          position: absolute;
          top: 60px;
          right: 0;
          background-color: rgba(26, 26, 26, 0.9);
          width: 100%;
          text-align: center;
          padding: 20px 0;
        }
        .nav-links.active {
          display: flex;
        }
        .burger {
          display: block;
        }
      }
      .medium-embed {
        margin-top: 60px;
        margin-right: 60px;
        margin-left: 60px;
        min-height: 600px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        background: #fff;
      }
      .container, .card, .publication, .contact-info {
        background: #fff;
        color: #222;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      }
      .card h3, .card p, .publication-title, .publication-desc, .contact-info h1, .contact-info p, .contact-info a {
        color: #222;
      }
      h2, h3 {
        color: #005a80;
      }
      .btn, .btn-read-more {
        background-color: #005a80;
        color: #fff;
      }
      .card,
      .project-card,
      .cert-item,
      .publication,
      .contact-info {
        box-shadow: 0 8px 24px rgba(0, 90, 128, 0.12), 0 1.5px 6px rgba(0, 90, 128, 0.08);
        border-radius: 16px;
        margin: 24px;
        padding: 24px;
        transition: box-shadow 0.3s, transform 0.3s;
        background: #fff;
        position: relative;
      }
      .card:hover,
      .project-card:hover,
      .cert-item:hover,
      .publication:hover,
      .contact-info:hover {
        box-shadow: 0 16px 32px rgba(0, 90, 128, 0.18), 0 3px 12px rgba(0, 90, 128, 0.12);
        transform: translateY(-4px) scale(1.03);
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>
    <script>
      fetch('/navbar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar').innerHTML = data;
        });
    </script>
    <div class="medium-embed" id="medium-masonry">
      <h1 style="text-align: center; color: #005a80; margin-bottom: 40px">
        Latest Blogs
      </h1>
      <!-- Medium posts will be loaded here -->
    </div>
    <script>
      async function fetchMediumRSS() {
        const rssUrl = "https://medium.com/feed/@neeldevenshah";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          if (!data.items) return;
          const container = document.getElementById("medium-masonry");
          container.innerHTML = '<h1 style="text-align:center;color:#005a80;margin-bottom:40px;">Latest Blogs</h1>';

          // Masonry grid for posts
          const grid = document.createElement("div");
          grid.style.display = "grid";
          grid.style.gridTemplateColumns = "repeat(auto-fit, minmax(320px, 1fr))";
          grid.style.gap = "30px";

          data.items.forEach((post) => {
            const card = document.createElement("div");
            card.style.background = "#fff";
            card.style.borderRadius = "10px";
            card.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)";
            card.style.padding = "24px";
            card.style.display = "flex";
            card.style.flexDirection = "column";
            card.style.justifyContent = "space-between";
            card.style.minHeight = "320px";

            // Extract image from post content
            let imgSrc = "";
            const imgMatch = post.description.match(/<img[^>]+src\s*=\s*['\"]([^'\"]+)['\"]/);
            if (imgMatch && imgMatch[1]) {
              imgSrc = imgMatch[1];
            }

            card.innerHTML = `
              ${imgSrc ? `<img src='${imgSrc}' alt='${post.title}' style='width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:12px;'>` : ""}
              <h2 style="font-size:1.2em;margin-bottom:10px;color:#005a80;">${post.title}</h2>
              <div style="margin-bottom:12px;color:#444;font-size:0.98em;">${post.description.replace(/<[^>]+>/g, "").slice(0, 180)}...</div>
              <a href="${post.link}" target="_blank" style="background:#005a80;color:#fff;padding:10px 15px;border-radius:5px;text-decoration:none;text-align:center;font-weight:500;">Read on Medium</a>
            `;
            grid.appendChild(card);
          });
          container.appendChild(grid);

          // Add 'See more blogs' button at the end
          const moreDiv = document.createElement("div");
          moreDiv.style.textAlign = "center";
          moreDiv.style.margin = "40px 0 0 0";
          moreDiv.innerHTML = `
            <a href="https://medium.com/@neeldevenshah" target="_blank" style="background:#005a80;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-size:1.1em;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:inline-block;">See more blogs on Medium</a>
          `;
          container.appendChild(moreDiv);
        } catch (err) {
          document.getElementById("medium-masonry").innerHTML = "<p>Unable to load Medium posts.</p>";
        }
      }
      fetchMediumRSS();
    </script>
  </body>
</html>
