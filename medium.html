<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neel Shah - Medium Blogs</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #222;
        --accent-color: #00a8e8;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      .nav {
        display: flex;
        justify-content: flex-end;
        padding: 20px;
        position: sticky;
        top: 0;
        background-color: rgba(26, 26, 26, 0.8);
        backdrop-filter: blur(5px);
        z-index: 1000;
      }
      .burger {
        display: none;
        cursor: pointer;
      }
      .burger div {
        width: 25px;
        height: 3px;
        background-color: var(--text-color);
        margin: 5px;
        transition: 0.3s;
      }
      .nav-links {
        display: flex;
      }
      .nav-links a {
        color: var(--text-color);
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      .nav-links a:hover {
        color: var(--accent-color);
      }
      @media only screen and (max-width: 600px) {
        .nav {
          justify-content: space-between;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          position: absolute;
          top: 60px;
          right: 0;
          background-color: rgba(26, 26, 26, 0.9);
          width: 100%;
          text-align: center;
          padding: 20px 0;
        }
        .nav-links.active {
          display: flex;
        }
        .burger {
          display: block;
        }
      }
      .medium-embed {
        margin-top: 60px;
        margin-right: 60px;
        margin-left: 60px;
        min-height: 600px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const burger = document.querySelector(".burger");
        const navLinks = document.querySelector(".nav-links");
        burger.addEventListener("click", () => {
          navLinks.classList.toggle("active");
        });
      });
    </script>
    <nav class="nav">
      <span style="margin-right: auto"><strong>Neel Shah</strong></span>
      <div class="burger">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div class="nav-links">
        <a href="/home.html">Home</a>
        <a href="/aboutme.html">About Me</a>
        <a href="/projects.html">Projects</a>
        <a href="/achievement.html">Achievements</a>
        <a href="/publications.html">Publications</a>
        <a href="/blogs.html">Blogs</a>
        <a href="/cv.html">Curriculum Vitae</a>
        <a href="/contact.html">Get in touch</a>
      </div>
    </nav>
    <div class="medium-embed" id="medium-masonry">
      <h1 style="text-align: center; color: #005a80; margin-bottom: 40px">
        Latest Blogs
      </h1>
      <!-- Medium profile and posts will be loaded here -->
    </div>
    <script>
      async function fetchMediumRSS() {
        const rssUrl = "https://medium.com/feed/@neeldevenshah";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(
          rssUrl
        )}`;
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          if (!data.items) return;
          const container = document.getElementById("medium-masonry");
          container.innerHTML =
            '<h1 style="text-align:center;color:#005a80;margin-bottom:40px;">Latest Blogs</h1>';

          // Profile header
          const profileDiv = document.createElement("div");
          profileDiv.style.display = "flex";
          profileDiv.style.alignItems = "center";
          profileDiv.style.marginBottom = "40px";
          profileDiv.style.gap = "24px";
          profileDiv.innerHTML = `
            <img src="https://avatars.githubusercontent.com/u/106433515?s=400&u=8465ced11835f10de43d4e55686e5f9348eec0e2&v=4" alt="Medium profile" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #00a8e8;">
            <div>
              <h1 style="margin:0;color:#005a80;font-size:2em;">Neel Shah</h1>
              <a href="https://medium.com/@neeldevenshah" target="_blank" style="color:#00a8e8;text-decoration:none;font-weight:500;">@neeldevenshah on Medium</a>
            </div>
          `;
          container.appendChild(profileDiv);

          // Masonry grid for posts
          const grid = document.createElement("div");
          grid.style.display = "grid";
          grid.style.gridTemplateColumns =
            "repeat(auto-fit, minmax(320px, 1fr))";
          grid.style.gap = "30px";

          data.items.forEach((post) => {
            const card = document.createElement("div");
            card.style.background = "#fff";
            card.style.borderRadius = "10px";
            card.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)";
            card.style.padding = "24px";
            card.style.display = "flex";
            card.style.flexDirection = "column";
            card.style.justifyContent = "space-between";
            card.style.minHeight = "320px";

            // Extract image from post content
            let imgSrc = "";
            const imgMatch = post.description.match(
              /<img[^>]+src\s*=\s*['\"]([^'\"]+)['\"]/
            );
            if (imgMatch && imgMatch[1]) {
              imgSrc = imgMatch[1];
            }

            card.innerHTML = `
              ${
                imgSrc
                  ? `<img src='${imgSrc}' alt='${post.title}' style='width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:12px;'>`
                  : ""
              }
              <h2 style="font-size:1.2em;margin-bottom:10px;color:#005a80;">${
                post.title
              }</h2>
              <div style="margin-bottom:12px;color:#444;font-size:0.98em;">${post.description
                .replace(/<[^>]+>/g, "")
                .slice(0, 180)}...</div>
              <a href="${
                post.link
              }" target="_blank" style="background:#00a8e8;color:#fff;padding:10px 15px;border-radius:5px;text-decoration:none;text-align:center;font-weight:500;">Read on Medium</a>
            `;
            grid.appendChild(card);
          });
          container.appendChild(grid);

          // Add 'See more blogs' button at the end
          const moreDiv = document.createElement("div");
          moreDiv.style.textAlign = "center";
          moreDiv.style.margin = "40px 0 0 0";
          moreDiv.innerHTML = `
            <a href="https://medium.com/@neeldevenshah" target="_blank" style="background:#005a80;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-size:1.1em;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:inline-block;">See more blogs on Medium</a>
          `;
          container.appendChild(moreDiv);
        } catch (err) {
          document.getElementById("medium-masonry").innerHTML =
            "<p>Unable to load Medium posts.</p>";
        }
      }
      fetchMediumRSS();
    </script>
  </body>
</html>
